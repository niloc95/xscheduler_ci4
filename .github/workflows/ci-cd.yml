name: WebScheduler CI/CD Pipeline

on:
  push:
    branches: [ main, env-setup-config-build ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual trigger

env:
  NODE_VERSION: '18'
  PHP_VERSION: '8.1'

jobs:
  # Build and Test Job
  build-and-test:
    name: Build & Test Assets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, fileinfo, tokenizer, gd, curl, zip
          tools: composer:v2
          coverage: none
          
      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
          
      - name: Install Node.js dependencies
        run: npm ci
        
      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction
        
      - name: Code quality gate — unscoped business_hours queries
        run: |
          # Any READ query against xs_business_hours without a provider_id filter is a bug:
          # the table has NO global rows — every row belongs to a provider.
          # Seeds/Migrations are excluded (they INSERT with provider_id on a later line).
          # See docs/architecture/CALENDAR_ENGINE_API_REFERENCE.md §Priority tier 2.
          echo "Checking for unscoped xs_business_hours queries..."
          HITS=$(grep -rn \
            "table('business_hours')\|from.*xs_business_hours\|->business_hours\b" \
            app/ \
            --include="*.php" \
            --exclude-dir=Database \
            | grep -v "provider_id" \
            | grep -vE ":[[:space:]]*[*/]" \
            || true)
          if [ -n "$HITS" ]; then
            echo "❌ Unscoped xs_business_hours query detected — add a provider_id filter:"
            echo "$HITS"
            exit 1
          fi
          echo "✅ No unscoped business_hours queries found"

      - name: API spec drift gate — openapi.yml must match the routes
        run: |
          # Fails if docs/technical/openapi.yml documents a phantom /api/v1 path
          # or omits a documented-resource route. Pure route-table check, no DB.
          php spark api:spec:validate

      - name: Build frontend assets
        run: npm run build
        
      - name: Validate build output
        run: |
          echo "Checking build assets..."
          ls public/build/assets/main-*.js > /dev/null 2>&1 || { echo "❌ main.js not found"; exit 1; }
          ls public/build/assets/style-*.css > /dev/null 2>&1 || { echo "❌ style.css not found"; exit 1; }
          ls public/build/assets/spa-*.js > /dev/null 2>&1 || { echo "❌ spa.js not found"; exit 1; }
          ls public/build/assets/setup-*.js > /dev/null 2>&1 || { echo "❌ setup.js not found"; exit 1; }
          echo "✅ All build assets found"
          
      - name: Check asset sizes
        run: |
          echo "Asset sizes:"
          ls -lh public/build/assets/
          echo "Total build size:"
          du -sh public/build/
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-assets-${{ github.sha }}
          path: public/build/
          retention-days: 7

  # PHPUnit Tests
  phpunit-tests:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    continue-on-error: true
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: webschedulr_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP with Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, fileinfo, tokenizer, gd, curl, zip, pdo_mysql, xdebug
          tools: composer:v2
          coverage: xdebug
          
      - name: Install PHP dependencies (with dev)
        run: |
          composer install --no-interaction
          composer dump-autoload --optimize

      - name: Create test database config
        run: |
          cp .env.example .env
          # Guarantee a newline boundary so appended keys never concatenate onto
          # the last line of .env.example (an unquoted "value ...key = val" line
          # makes CI4's DotEnv throw "values containing spaces must be quoted").
          printf '\n' >> .env
          echo "CI_ENVIRONMENT = testing" >> .env
          # .env.example ships app.baseURL='' — CI4 bootstrap (spark migrate) fatals
          # with ConfigException: baseURL "/" is not a valid URL until it's set.
          echo "app.baseURL = 'http://localhost:8080/'" >> .env
          echo "database.tests.hostname = 127.0.0.1" >> .env
          echo "database.tests.database = webschedulr_test" >> .env
          echo "database.tests.username = test_user" >> .env
          echo "database.tests.password = test_password" >> .env
          echo "database.tests.DBDriver = MySQLi" >> .env
          echo "database.tests.DBPrefix = xs_" >> .env
          echo "database.tests.port = 3306" >> .env

      - name: Wait for MySQL readiness
        run: |
          for i in {1..30}; do
            mysqladmin ping -h127.0.0.1 -utest_user -ptest_password --silent && break
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Enforce UTC timezone in MySQL
        run: |
          mysql -h127.0.0.1 -uroot -ptest_password -e "SET GLOBAL time_zone = '+00:00';"
          mysql -h127.0.0.1 -utest_user -ptest_password -Dwebschedulr_test -e "SET time_zone = '+00:00';"

      - name: Fresh migrate test schema
        run: |
          # -f: skip the interactive "Are you sure?" prompt — CI has no TTY, so
          # CLI::prompt() would read false from stdin and throw a TypeError.
          php spark migrate:refresh -n App --all -f

      - name: Seed baseline availability integration data
        run: |
          php spark db:seed AvailabilityIntegrationSeeder
          
      - name: Run PHPUnit tests
        run: vendor/bin/phpunit -c phpunit.mysql.xml.dist --testdox --colors=always

      - name: Run availability MySQL regression test
        run: vendor/bin/phpunit -c phpunit.mysql.xml.dist --filter AvailabilitySlotsLocationFallbackTest --colors=always
        
      - name: Generate coverage report
        run: |
          set -o pipefail
          vendor/bin/phpunit -c phpunit.mysql.xml.dist --coverage-text --coverage-html coverage/ | tee coverage-summary.txt
        
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 30
          
      - name: Check coverage threshold
        run: |
          echo "Checking test coverage..."
          COVERAGE=$(grep "Lines:" coverage-summary.txt | awk '{print $2}' | sed 's/%//')
          echo "Current coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 40" | bc -l) )); then
            echo "⚠️ Coverage is below 40% threshold"
            exit 1
          fi
          echo "✅ Coverage meets minimum threshold"

  # Setup Functionality Test
  setup-test:
    name: Test Setup Wizard
    runs-on: ubuntu-latest
    needs: build-and-test
    continue-on-error: true
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: webschedulr_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, fileinfo, tokenizer, gd, curl, zip, pdo_mysql
          tools: composer:v2
          
      - name: Install PHP dependencies
        run: |
          composer install --no-interaction
          composer dump-autoload --optimize

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-assets-${{ github.sha }}
          path: public/build/
          
      - name: Setup test environment
        run: |
          cp .env.example .env
          # Guarantee a newline boundary before appending (see phpunit job note).
          printf '\n' >> .env
          echo "CI_ENVIRONMENT = testing" >> .env
          echo "app.baseURL = 'http://localhost:8080/'" >> .env
          
      - name: Start CodeIgniter development server
        run: |
          php spark serve --port=8080 &
          echo "Waiting for server to become ready..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:8080/ > /dev/null 2>&1 && echo "Server ready after ${i}s" && break
            sleep 1
          done
          
      - name: Test setup page accessibility
        run: |
          echo "Testing setup page..."
          curl -f http://localhost:8080/setup || { echo "❌ Setup page not accessible"; exit 1; }
          echo "✅ Setup page accessible"
          
      - name: Test MySQL connection endpoint
        run: |
          echo "Testing MySQL connection endpoint..."
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "db_driver": "MySQLi",
              "db_hostname": "127.0.0.1",
              "db_port": "3306",
              "db_database": "webschedulr_test",
              "db_username": "test_user",
              "db_password": "test_password"
            }' \
            http://localhost:8080/setup/test-connection || { echo "❌ MySQL connection test failed"; exit 1; }
          echo "✅ MySQL connection test passed"

  # Code Quality & Security Checks
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install Node.js dependencies
        run: npm ci
        
      - name: Check for security vulnerabilities
        run: npm audit --audit-level=moderate
        
      - name: Check for outdated packages
        run: npm outdated || true
        
      - name: Validate package.json
        run: npm run build --dry-run || npm run build
        
      - name: Check file permissions
        run: |
          echo "Checking file permissions..."
          find . -name "*.php" -perm /u+x | grep -v vendor | head -5 || echo "No executable PHP files found"
          echo "✅ File permissions check completed"

  # Performance & Asset Analysis
  performance-analysis:
    name: Performance Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-assets-${{ github.sha }}
          path: public/build/
          
      - name: Analyze bundle sizes
        run: |
          echo "## Asset Size Analysis" > asset-analysis.md
          echo "" >> asset-analysis.md
          echo "| Asset | Size | Gzipped |" >> asset-analysis.md
          echo "|-------|------|---------|" >> asset-analysis.md
          
          for file in public/build/assets/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              size=$(ls -lh "$file" | awk '{print $5}')
              gzipped=$(gzip -c "$file" | wc -c | awk '{print int($1/1024)"KB"}')
              echo "| $filename | $size | $gzipped |" >> asset-analysis.md
            fi
          done
          
          echo "" >> asset-analysis.md
          echo "**Total build size:** $(du -sh public/build/ | awk '{print $1}')" >> asset-analysis.md
          
          cat asset-analysis.md
          
      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: performance-analysis-${{ github.sha }}
          path: asset-analysis.md
          retention-days: 30
