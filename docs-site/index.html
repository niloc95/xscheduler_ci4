<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebScheduler API Reference</title>
    <meta name="description" content="REST API reference for WebScheduler — appointments, availability, customers, services, providers and more.">
    <style>
        html, body { margin: 0; padding: 0; height: 100%; }
        #dev-topbar {
            display: flex; align-items: center; justify-content: space-between;
            gap: 1rem; padding: 0.75rem 1.25rem;
            font-family: Inter, system-ui, -apple-system, sans-serif;
            background: #0f172a; color: #f8fafc;
            border-bottom: 1px solid #1e293b;
        }
        #dev-topbar a { color: #93c5fd; text-decoration: none; font-size: 0.9rem; }
        #dev-topbar a:hover { text-decoration: underline; }
        #dev-topbar .brand { font-weight: 600; font-size: 1rem; color: #f8fafc; }
        #redoc-container { display: block; }
        #redoc-fallback {
            display: none; max-width: 640px; margin: 4rem auto; padding: 0 1.25rem;
            font-family: Inter, system-ui, -apple-system, sans-serif; color: #334155;
        }
    </style>
</head>
<body>
    <div id="dev-topbar">
        <span class="brand">WebScheduler API</span>
        <span>
            <a href="./getting-started.html">Getting started</a>
            &nbsp;·&nbsp;
            <a href="./openapi.yaml">Download spec</a>
        </span>
    </div>

    <div id="redoc-container"></div>
    <noscript>
        <div style="max-width:640px;margin:4rem auto;padding:0 1.25rem;font-family:system-ui,sans-serif;">
            <h1>WebScheduler API</h1>
            <p>This interactive reference needs JavaScript. You can still read the
               <a href="./getting-started.html">getting-started guide</a> or download the
               <a href="./openapi.yaml">OpenAPI spec</a>.</p>
        </div>
    </noscript>

    <!-- Self-hosted Redoc runtime — no CDN, no external requests. -->
    <script src="./redoc.standalone.js"></script>
    <script>
        (function () {
            var el = document.getElementById('redoc-container');
            if (!window.Redoc || typeof window.Redoc.init !== 'function') { return; }
            window.Redoc.init(
                './openapi.yaml',
                {
                    hideDownloadButton: false,
                    expandResponses: '200,201',
                    jsonSampleExpandLevel: 2,
                    theme: {
                        colors: { primary: { main: '#2563eb' } },
                        typography: {
                            fontFamily: 'Inter, system-ui, -apple-system, sans-serif',
                            headings: { fontFamily: 'Inter, system-ui, -apple-system, sans-serif' }
                        }
                    }
                },
                el
            );
        })();
    </script>
</body>
</html>
