<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebSchedulr — Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════ */
:root {
  --ocean:       #003049;
  --ocean-mid:   #0b4b70;
  --ocean-lt:    #e6f2f8;
  --ocean-xlt:   #f0f7fb;
  --teal:        #0ea5e9;
  --cream:       #fdf8f0;
  --cream-warm:  #f5ede0;
  --surf0:       #ffffff;
  --surf1:       #f8f9fb;
  --surf2:       #f1f3f7;
  --surf3:       #e8eaef;
  --bdr:         #e2e6ed;
  --bdr-lt:      #edf0f4;
  --txt1:        #0d1526;
  --txt2:        #4a5568;
  --txt3:        #8a97ab;
  --now:         #ef4444;
  --green:       #10b981;
  --amber:       #f59e0b;
  --red:         #ef4444;
  --blue:        #3b82f6;
  --p1: #3b82f6; --p2: #10b981; --p3: #f59e0b; --p4: #8b5cf6; --p5: #f43f5e;
  --hr-h: 60px;
  --tc-w: 52px;
  --panel-w: 38%;
  --cal-w: 62%;
  --sidebar-w: 200px;
  --toolbar-h: 54px;
  --r: 10px;
  --r-sm: 7px;
  --r-xs: 4px;
  --sh1: 0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh2: 0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --sh3: 0 8px 24px rgba(0,0,0,.10),0 3px 8px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--surf1);color:var(--txt1);height:100vh;overflow:hidden;font-size:13.5px;}

/* ═══════════════════════════════════════════════
   SHELL
═══════════════════════════════════════════════ */
.shell{display:flex;height:100vh;overflow:hidden;}

/* ── Sidebar ── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--ocean);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sb-logo{
  padding:18px 16px 16px;
  font-family:'Syne',sans-serif;font-size:19px;font-weight:800;
  color:#fff;letter-spacing:-.5px;
  border-bottom:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
}
.sb-logo em{color:#7dd3fc;font-style:normal;}
.sb-logo small{display:block;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:400;color:rgba(255,255,255,.4);letter-spacing:.04em;margin-top:1px;}
.sb-nav{padding:10px 8px;flex-shrink:0;}
.sb-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:var(--r-sm);
  font-size:13px;font-weight:500;color:rgba(255,255,255,.6);
  cursor:pointer;transition:all .14s;
  text-decoration:none;
}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff;}
.sb-item.active{background:rgba(255,255,255,.12);color:#fff;}
.sb-item svg{flex-shrink:0;opacity:.75;}
.sb-section{padding:4px 8px 0;}
.sb-lbl{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:0 10px 5px;}
.sb-divider{height:1px;background:rgba(255,255,255,.07);margin:8px 8px;}

/* Provider list in sidebar */
.sb-providers{padding:0 8px;overflow-y:auto;flex:1;}
.sb-prov-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;border-radius:var(--r-sm);
  cursor:pointer;transition:background .14s;
}
.sb-prov-item:hover{background:rgba(255,255,255,.06);}
.prov-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.prov-nm{font-size:12.5px;color:rgba(255,255,255,.68);font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prov-tog{
  width:26px;height:15px;border-radius:8px;
  background:rgba(255,255,255,.13);position:relative;
  transition:background .18s;cursor:pointer;border:none;flex-shrink:0;
}
.prov-tog.on{background:rgba(125,211,252,.45);}
.prov-tog::after{
  content:'';position:absolute;
  width:11px;height:11px;border-radius:50%;
  background:#fff;top:2px;left:2px;transition:transform .18s;
}
.prov-tog.on::after{transform:translateX(11px);}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* ── Toolbar ── */
.toolbar{
  height:var(--toolbar-h);flex-shrink:0;
  display:flex;align-items:center;gap:8px;
  padding:0 16px;
  background:var(--surf0);
  border-bottom:1px solid var(--bdr);
}
.view-tabs{display:flex;background:var(--surf2);border-radius:var(--r-sm);padding:3px;gap:2px;}
.v-tab{
  padding:5px 13px;border-radius:6px;
  font-size:12.5px;font-weight:600;cursor:pointer;
  color:var(--txt2);transition:all .14s;border:none;background:none;
  font-family:'DM Sans',sans-serif;
}
.v-tab.active{background:var(--surf0);color:var(--ocean);box-shadow:var(--sh1);}
.tb-div{width:1px;height:22px;background:var(--bdr);}
.btn-today{
  padding:5px 12px;border-radius:var(--r-sm);
  font-size:12.5px;font-weight:600;
  border:1.5px solid var(--bdr);background:var(--surf0);
  color:var(--txt1);cursor:pointer;transition:all .14s;
  font-family:'DM Sans',sans-serif;
}
.btn-today:hover{border-color:var(--ocean);color:var(--ocean);}
.nav-grp{display:flex;align-items:center;gap:4px;flex:1;justify-content:center;}
.btn-nav{
  width:28px;height:28px;border-radius:var(--r-sm);
  border:1.5px solid var(--bdr);background:var(--surf0);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--txt2);transition:all .14s;font-size:15px;
}
.btn-nav:hover{background:var(--surf2);color:var(--ocean);}
.date-lbl{
  font-family:'Syne',sans-serif;font-size:14.5px;font-weight:700;
  color:var(--txt1);min-width:190px;text-align:center;letter-spacing:-.3px;
}
.stat-chips{display:flex;gap:5px;margin-left:auto;}
.s-chip{
  display:flex;align-items:center;gap:4px;
  padding:4px 9px;border-radius:99px;
  font-size:11px;font-weight:600;cursor:pointer;
  border:1.5px solid transparent;transition:all .14s;
}
.s-chip-dot{width:5px;height:5px;border-radius:50%;}
.s-chip.pend{background:#fffbeb;color:#92400e;border-color:#fde68a;}
.s-chip.conf{background:#ecfdf5;color:#065f46;border-color:#a7f3d0;}
.s-chip.comp{background:#eff6ff;color:#1e40af;border-color:#bfdbfe;}
.btn-new{
  padding:6px 14px;border-radius:var(--r-sm);
  background:var(--ocean);color:#fff;
  font-weight:600;font-size:12.5px;border:none;cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:background .14s;
  font-family:'DM Sans',sans-serif;flex-shrink:0;
}
.btn-new:hover{background:var(--ocean-mid);}

/* ═══════════════════════════════════════════════
   CONTENT SPLIT
═══════════════════════════════════════════════ */
.content-split{
  flex:1;display:flex;overflow:hidden;
}

/* ── Left: Calendar ── */
.cal-pane{
  width:var(--cal-w);flex-shrink:0;
  display:flex;flex-direction:column;
  overflow:hidden;border-right:1px solid var(--bdr);
}

/* ── Right: Fixed Panel ── */
.right-panel{
  width:var(--panel-w);flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--surf0);
  overflow:hidden;
}
.rp-header{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--bdr);
  flex-shrink:0;
}
.rp-title{
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;
  color:var(--txt1);display:flex;align-items:center;gap:7px;
}
.rp-title-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.rp-date{font-size:11px;color:var(--txt3);margin-top:2px;}
.rp-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:0;}

/* ═══════════════════════════════════════════════
   RIGHT PANEL — PROVIDER CARDS
═══════════════════════════════════════════════ */
.rp-section{
  padding:12px 16px;
  border-bottom:1px solid var(--bdr-lt);
}
.rp-section-label{
  font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--txt3);margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
}
.rp-section-label span{
  font-size:10px;font-weight:600;color:var(--txt3);
  background:var(--surf2);padding:1px 6px;border-radius:99px;letter-spacing:0;
  text-transform:none;
}

/* Provider card in right panel */
.rp-prov-card{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:var(--r);
  border:1.5px solid var(--bdr-lt);
  margin-bottom:6px;cursor:pointer;
  transition:all .15s;background:var(--surf0);
  position:relative;overflow:hidden;
}
.rp-prov-card:last-child{margin-bottom:0;}
.rp-prov-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;border-radius:2px 0 0 2px;
}
.rp-prov-card:hover{border-color:var(--bdr);box-shadow:var(--sh1);}
.rp-prov-card.selected{border-color:currentColor;background:var(--surf1);}
.prov-av{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:11px;font-weight:700;flex-shrink:0;
}
.prov-info{flex:1;min-width:0;}
.prov-name-sm{font-size:12.5px;font-weight:600;color:var(--txt1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prov-meta{font-size:11px;color:var(--txt3);margin-top:1px;}
.prov-load-bar{
  height:3px;border-radius:2px;background:var(--surf3);
  margin-top:5px;overflow:hidden;
}
.prov-load-fill{height:100%;border-radius:2px;transition:width .4s ease;}
.prov-stats{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.prov-stat{
  display:flex;flex-direction:column;align-items:center;
  min-width:26px;
}
.prov-stat-n{font-size:14px;font-weight:700;line-height:1;color:var(--txt1);}
.prov-stat-l{font-size:9px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.04em;}
.prov-avail-badge{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;
  white-space:nowrap;
}

/* ═══════════════════════════════════════════════
   RIGHT PANEL — SLOT GRID
═══════════════════════════════════════════════ */
.rp-slots-section{
  padding:12px 16px;flex:1;
}
.slot-filter-row{
  display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;
}
.slot-filter-pill{
  padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;
  border:1.5px solid var(--bdr);background:var(--surf0);color:var(--txt2);
  cursor:pointer;transition:all .14s;
}
.slot-filter-pill.active{
  background:var(--ocean);color:#fff;border-color:var(--ocean);
}
.slots-grid{display:flex;flex-direction:column;gap:3px;}
.slot-hour-group{margin-bottom:6px;}
.slot-hour-lbl{
  font-size:9.5px;font-weight:700;color:var(--txt3);
  letter-spacing:.05em;text-transform:uppercase;
  padding:2px 0 4px;
}
.slot-row{display:flex;gap:3px;flex-wrap:wrap;}
.slot-pill{
  padding:4px 9px;border-radius:var(--r-xs);
  font-size:11px;font-weight:600;
  font-family:'DM Mono',monospace;
  cursor:pointer;transition:all .15s;
  border:1.5px solid;
  display:flex;align-items:center;gap:4px;
}
.slot-pill.free{
  background:var(--surf0);border-color:var(--bdr);color:var(--ocean);
}
.slot-pill.free:hover{background:var(--ocean);color:#fff;border-color:var(--ocean);}
.slot-pill.booked{
  background:var(--surf2);border-color:var(--bdr-lt);
  color:var(--txt3);cursor:default;text-decoration:line-through;
}
.slot-pill.partial{
  background:#fffbeb;border-color:#fde68a;color:#92400e;
}
.slot-prov-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

/* ── No service state ── */
.rp-empty{
  padding:24px 16px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.rp-empty-icon{font-size:28px;opacity:.3;}
.rp-empty-title{font-size:13px;font-weight:600;color:var(--txt2);}
.rp-empty-sub{font-size:11.5px;color:var(--txt3);line-height:1.5;}

/* ═══════════════════════════════════════════════
   TODAY VIEW
═══════════════════════════════════════════════ */
.today-view{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.today-hero{
  background:linear-gradient(135deg,var(--ocean) 0%,var(--ocean-mid) 100%);
  border-radius:var(--r);padding:16px 18px;color:#fff;flex-shrink:0;
}
.today-hero-date{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px;}
.today-hero-sub{font-size:11.5px;color:rgba(255,255,255,.6);margin-top:2px;}
.today-hero-stats{display:flex;gap:16px;margin-top:14px;}
.today-stat{display:flex;flex-direction:column;}
.today-stat-n{font-size:22px;font-weight:700;font-family:'Syne',sans-serif;line-height:1;}
.today-stat-l{font-size:10px;color:rgba(255,255,255,.55);margin-top:2px;letter-spacing:.03em;}
.today-appt-list{display:flex;flex-direction:column;gap:4px;}
.today-appt-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:var(--r);
  background:var(--surf0);border:1.5px solid var(--bdr-lt);
  cursor:pointer;transition:all .15s;
  border-left:3px solid;
}
.today-appt-row:hover{box-shadow:var(--sh1);border-right-color:var(--bdr);}
.ta-time{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--txt3);min-width:36px;flex-shrink:0;}
.ta-info{flex:1;min-width:0;}
.ta-name{font-size:13px;font-weight:600;color:var(--txt1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ta-svc{font-size:11px;color:var(--txt3);}
.ta-prov{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.ta-prov-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:8.5px;font-weight:700;}
.ta-status{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;flex-shrink:0;}
.today-section-lbl{
  font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--txt3);padding:4px 0 2px;
}

/* ═══════════════════════════════════════════════
   MONTH VIEW
═══════════════════════════════════════════════ */
.month-view{flex:1;display:flex;flex-direction:column;padding:12px 14px;gap:6px;overflow:hidden;}
.month-wds{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 2px;}
.month-wd{text-align:center;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--txt3);padding:3px 0;}
.month-grid{
  flex:1;display:grid;
  grid-template-columns:repeat(7,1fr);
  grid-template-rows:repeat(6,1fr);
  gap:3px;min-height:0;
}
.m-cell{
  background:var(--surf0);border:1.5px solid var(--bdr-lt);
  border-radius:var(--r-sm);padding:6px;
  display:flex;flex-direction:column;
  cursor:pointer;transition:border-color .14s,box-shadow .14s;
  overflow:hidden;min-height:80px;
}
.m-cell:hover{border-color:var(--ocean-lt);box-shadow:var(--sh1);}
.m-cell.is-today{border-color:var(--ocean);border-width:2px;}
.m-cell.is-wknd{background:var(--cream);}
.m-cell.is-other{background:var(--surf1);opacity:.5;}
.m-cell.is-selected{background:var(--ocean-xlt);border-color:var(--teal);}
.m-cell-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:3px;}
.m-day-n{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12.5px;font-weight:600;color:var(--txt2);flex-shrink:0;
}
.is-today .m-day-n{background:var(--ocean);color:#fff;}
.m-prov-dots{display:flex;gap:2px;flex-wrap:wrap;padding-top:3px;}
.m-pd{width:5px;height:5px;border-radius:50%;}
.m-chips{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden;}
.m-chip{
  display:flex;align-items:center;gap:3px;
  padding:1.5px 5px;border-radius:3px;
  font-size:10.5px;font-weight:500;color:#fff;
  white-space:nowrap;overflow:hidden;cursor:pointer;
}
.m-chip:hover{opacity:.88;}
.m-chip-t{font-size:9.5px;opacity:.8;font-family:'DM Mono',monospace;flex-shrink:0;}
.m-chip-n{overflow:hidden;text-overflow:ellipsis;}
.m-more{font-size:10px;font-weight:600;color:var(--txt3);padding:1px 4px;border-radius:3px;background:var(--surf2);cursor:pointer;align-self:flex-start;}
.m-avbar{height:2.5px;border-radius:2px;background:var(--surf3);margin-top:3px;overflow:hidden;flex-shrink:0;}
.m-avfill{height:100%;border-radius:2px;}

/* ═══════════════════════════════════════════════
   WEEK VIEW — TIME GRID
═══════════════════════════════════════════════ */
.week-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.wk-col-hds{
  display:grid;grid-template-columns:var(--tc-w) repeat(7,1fr);
  border-bottom:1px solid var(--bdr);background:var(--surf0);flex-shrink:0;
  padding:0 14px;
}
.wk-ch{
  padding:8px 6px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.wk-wd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);}
.wk-dn{
  width:29px;height:29px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:var(--txt2);cursor:pointer;transition:all .14s;
}
.wk-dn.is-today{background:var(--ocean);color:#fff;}
.wk-dn.is-sel{background:var(--ocean-lt);color:var(--ocean);}
.wk-wd.t-txt{color:var(--ocean);}
.wk-scroll{flex:1;overflow-y:auto;overflow-x:hidden;}
.wk-grid{
  display:grid;grid-template-columns:var(--tc-w) repeat(7,1fr);
  padding:0 14px;position:relative;
}
.tc{display:flex;flex-direction:column;}
.t-lbl{
  height:var(--hr-h);display:flex;align-items:flex-start;justify-content:flex-end;
  padding-right:8px;margin-top:-8px;
  font-size:10px;font-weight:600;color:var(--txt3);
  font-family:'DM Mono',monospace;
}
.t-lbl:first-child{visibility:hidden;}
.dc{
  border-left:1px solid var(--bdr-lt);
  position:relative;background:var(--surf0);
}
.dc.t-col{background:#fafcff;}
.dc.wk-col{background:var(--cream);}
.h-line{position:absolute;left:0;right:0;border-top:1px solid var(--bdr-lt);pointer-events:none;}
.hh-line{position:absolute;left:0;right:0;border-top:1px dashed #edf0f5;pointer-events:none;}
.now-ln{
  position:absolute;left:0;right:0;
  display:flex;align-items:center;pointer-events:none;z-index:10;
}
.now-ln::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--now);flex-shrink:0;margin-left:-3.5px;}
.now-ln::after{content:'';flex:1;height:2px;background:var(--now);}
.wa{
  position:absolute;left:3px;right:3px;border-radius:5px;
  padding:3px 5px;overflow:hidden;cursor:pointer;
  display:flex;flex-direction:column;
  transition:filter .12s,transform .1s;z-index:2;
  border-left:3px solid rgba(0,0,0,.18);
}
.wa:hover{filter:brightness(.93);transform:scaleX(1.015);z-index:5;}
.wa-name{font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wa-svc{font-size:9.5px;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wa-time{font-size:9px;color:rgba(255,255,255,.6);font-family:'DM Mono',monospace;}

/* ═══════════════════════════════════════════════
   DAY VIEW — MULTI-PROVIDER TIME GRID
═══════════════════════════════════════════════ */
.day-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.dv-prov-hd{
  display:flex;background:var(--surf0);
  border-bottom:1px solid var(--bdr);flex-shrink:0;padding:0 14px;
}
.dv-tc-sp{width:var(--tc-w);flex-shrink:0;}
.dv-prov-cols{flex:1;display:grid;}
.dv-pc-hd{
  padding:8px 12px;display:flex;align-items:center;gap:7px;
  border-left:1px solid var(--bdr-lt);
}
.dv-pc-hd:first-child{border-left:none;}
.dv-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;flex-shrink:0;}
.dv-pnm{font-size:12px;font-weight:600;color:var(--txt1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.dv-pcnt{font-size:10px;font-weight:700;background:var(--surf2);color:var(--txt2);padding:1px 6px;border-radius:99px;margin-left:auto;flex-shrink:0;}
.dv-scroll{flex:1;overflow-y:auto;}
.dv-grid{display:grid;grid-template-columns:var(--tc-w) 1fr;padding:0 14px 14px;}
.dv-prov-grid{display:grid;position:relative;}
.dv-stripe{border-left:1px solid var(--bdr-lt);position:relative;}
.dv-stripe:first-child{border-left:none;}
.da{
  position:absolute;left:4px;right:4px;
  border-radius:var(--r-sm);padding:5px 7px;
  cursor:pointer;display:flex;flex-direction:column;gap:1.5px;
  border-left:3px solid rgba(0,0,0,.12);overflow:hidden;
  transition:filter .12s,box-shadow .12s;z-index:2;
}
.da:hover{filter:brightness(.93);box-shadow:var(--sh2);z-index:5;}
.da-nm{font-size:11.5px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.da-svc{font-size:10px;color:rgba(255,255,255,.82);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.da-tm{font-size:9.5px;color:rgba(255,255,255,.65);font-family:'DM Mono',monospace;}

/* ═══════════════════════════════════════════════
   FLYOUT DETAIL
═══════════════════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:99;opacity:0;pointer-events:none;transition:opacity .22s;}
.overlay.on{opacity:1;pointer-events:auto;}
.flyout{
  position:fixed;right:-380px;top:0;bottom:0;width:360px;
  background:var(--surf0);box-shadow:var(--sh3);z-index:100;
  display:flex;flex-direction:column;transition:right .24s cubic-bezier(.4,0,.2,1);
  border-left:1px solid var(--bdr);
}
.flyout.on{right:0;}
.fly-hd{
  padding:18px 18px 14px;border-bottom:1px solid var(--bdr);
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
  flex-shrink:0;
}
.fly-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;line-height:1.2;}
.fly-close{
  width:30px;height:30px;border-radius:var(--r-xs);border:1.5px solid var(--bdr);
  background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:17px;color:var(--txt2);transition:all .12s;flex-shrink:0;
}
.fly-close:hover{background:var(--surf2);}
.fly-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;}
.fly-row{display:flex;flex-direction:column;gap:3px;}
.fly-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);}
.fly-val{font-size:13.5px;font-weight:500;color:var(--txt1);}
.fly-status{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600;}
.fly-actions{padding:14px 18px;border-top:1px solid var(--bdr);display:flex;gap:7px;flex-shrink:0;}
.fly-btn{
  flex:1;padding:8px;border-radius:var(--r-sm);
  font-size:12.5px;font-weight:600;cursor:pointer;transition:all .14s;
  border:1.5px solid var(--bdr);background:var(--surf0);
  font-family:'DM Sans',sans-serif;
}
.fly-btn:hover{background:var(--surf2);}
.fly-btn.primary{background:var(--ocean);color:#fff;border-color:var(--ocean);}
.fly-btn.primary:hover{background:var(--ocean-mid);}
.fly-btn.danger{color:#dc2626;border-color:#fecaca;}
.fly-btn.danger:hover{background:#fff1f2;}

/* Scrollbar */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--txt3);}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.anim{animation:fadeIn .2s ease both;}
</style>
</head>
<body>
<div class="shell">

<!-- ── SIDEBAR ── -->

<script>
/* ════════════════════════════════════════
   DATA
════════════════════════════════════════ */
const PROVIDERS=[
  {id:1,name:'Dr. Sarah Chen',init:'SC',color:'#3b82f6',role:'GP'},
  {id:2,name:'Dr. James Okafor',init:'JO',color:'#10b981',role:'Specialist'},
  {id:3,name:'Dr. Priya Naidoo',init:'PN',color:'#f59e0b',role:'Therapist'},
  {id:4,name:'Dr. Thomas Berg',init:'TB',color:'#8b5cf6',role:'Physiotherapist'},
];
const visP=new Set([1,2,3,4]);

const today=new Date(); today.setHours(0,0,0,0);
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function ds(d){return d.toISOString().slice(0,10);}
function sameD(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}

const NAMES=['Amahle Dube','Marcus Steyn','Zanele Khumalo','Pieter van Wyk','Nomsa Zulu','David Nkosi','Lisa Fourie','Ahmed Hassan','Thando Mokoena','Sasha Petrov','Grace Molefe','Ryan Adams','Fatima Patel','Johan Botha'];
const SERVICES=['Consultation','Follow-up','Assessment','Treatment','Check-up','Therapy Session'];
const DURATIONS=[30,20,45,60,30,50];
const STATUSES=['confirmed','confirmed','confirmed','pending','pending','completed','confirmed','confirmed'];

const SCHED=[
  {o:0,h:8,m:0,p:1,n:0,s:0},{o:0,h:9,m:0,p:1,n:1,s:1},{o:0,h:9,m:30,p:2,n:2,s:4},
  {o:0,h:10,m:0,p:3,n:3,s:0},{o:0,h:10,m:30,p:2,n:4,s:2},{o:0,h:11,m:0,p:1,n:5,s:3},
  {o:0,h:13,m:0,p:3,n:6,s:4},{o:0,h:14,m:0,p:4,n:7,s:1},{o:0,h:14,m:30,p:1,n:8,s:5},
  {o:0,h:15,m:0,p:2,n:9,s:0},{o:0,h:16,m:0,p:4,n:10,s:2},
  {o:1,h:8,m:30,p:1,n:2,s:0},{o:1,h:9,m:0,p:2,n:3,s:3},{o:1,h:10,m:0,p:3,n:5,s:1},
  {o:1,h:11,m:0,p:4,n:7,s:4},{o:1,h:14,m:0,p:1,n:0,s:2},{o:1,h:15,m:30,p:2,n:4,s:5},
  {o:2,h:9,m:0,p:1,n:6,s:0},{o:2,h:10,m:30,p:3,n:1,s:2},{o:2,h:13,m:0,p:2,n:8,s:3},
  {o:2,h:14,m:0,p:4,n:9,s:1},{o:2,h:15,m:0,p:1,n:11,s:5},
  {o:3,h:8,m:0,p:2,n:0,s:4},{o:3,h:9,m:30,p:1,n:3,s:0},{o:3,h:11,m:0,p:3,n:5,s:2},
  {o:3,h:14,m:0,p:4,n:7,s:3},{o:3,h:16,m:0,p:2,n:9,s:1},
  {o:-1,h:9,m:0,p:1,n:1,s:0},{o:-1,h:10,m:0,p:2,n:4,s:4},{o:-1,h:11,m:0,p:3,n:6,s:2},
  {o:-1,h:14,m:0,p:4,n:10,s:4},{o:-1,h:15,m:0,p:1,n:11,s:5},
  {o:-2,h:8,m:30,p:2,n:0,s:0},{o:-2,h:10,m:0,p:1,n:3,s:3},{o:-2,h:14,m:0,p:3,n:7,s:1},
  {o:4,h:9,m:0,p:1,n:2,s:0},{o:4,h:10,m:0,p:2,n:5,s:2},{o:4,h:14,m:0,p:3,n:8,s:4},
  {o:5,h:9,m:0,p:2,n:1,s:3},{o:5,h:10,m:30,p:1,n:9,s:0},{o:5,h:14,m:0,p:4,n:11,s:2},
  {o:6,h:9,m:0,p:1,n:0,s:1},{o:6,h:11,m:0,p:3,n:6,s:4},
  {o:7,h:9,m:0,p:2,n:3,s:0},{o:7,h:10,m:0,p:1,n:5,s:2},{o:7,h:14,m:0,p:4,n:8,s:5},
];

let AID=1;
const APPTS=SCHED.map(({o,h,m,p,n,s})=>{
  const st=addD(today,o); st.setHours(h,m,0,0);
  const dur=DURATIONS[s];
  const en=new Date(st.getTime()+dur*60000);
  return {id:AID++,customer:NAMES[n],service:SERVICES[s],dur,provider:p,start:st,end:en,status:STATUSES[AID%STATUSES.length]};
});

const BIZ_S=8, BIZ_E=17, HR_H=60;
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const WDS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let view='week', curD=new Date(today), selProv=null;

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
function f12(d){let h=d.getHours(),m=d.getMinutes(),ap=h<12?'a':'p';h=h%12||12;return`${h}:${String(m).padStart(2,'0')}${ap}`;}
function topPx(d){return((d.getHours()-BIZ_S)*60+d.getMinutes())/60*HR_H;}
function htPx(dur){return Math.max(dur/60*HR_H-3,20);}
function pColor(pid){return PROVIDERS.find(p=>p.id===pid)?.color||'#6b7280';}
function pInit(pid){return PROVIDERS.find(p=>p.id===pid)?.init||'?';}
function byDay(d){return APPTS.filter(a=>sameD(a.start,d)&&visP.has(a.provider));}
function byDayP(d,pid){return byDay(d).filter(a=>a.provider===pid);}
function wkStart(d){const wd=d.getDay(),c=new Date(d);c.setDate(d.getDate()-((wd===0?7:wd)-1));c.setHours(0,0,0,0);return c;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const STATUS_C={
  confirmed:{bg:'#d1fae5',c:'#065f46',dot:'#10b981'},
  pending:{bg:'#fef3c7',c:'#92400e',dot:'#f59e0b'},
  completed:{bg:'#dbeafe',c:'#1e40af',dot:'#3b82f6'},
  cancelled:{bg:'#fee2e2',c:'#991b1b',dot:'#ef4444'},
  'no-show':{bg:'#f3e8ff',c:'#6b21a8',dot:'#8b5cf6'},
};

// Overlap resolver — simple sweep-line
function resolveOL(appts){
  const s=[...appts].sort((a,b)=>a.start-b.start);
  const cols=[];
  const r=s.map(a=>{
    let ci=0;
    while(cols[ci]&&cols[ci]>a.start.getTime()) ci++;
    cols[ci]=a.end.getTime();
    return{...a,_c:ci};
  });
  const mc=r.reduce((m,a)=>Math.max(m,a._c),0);
  return r.map(a=>({...a,_cc:mc+1}));
}

// Slot generation
function genSlots(d,pid){
  const slots=[];
  for(let h=BIZ_S;h<BIZ_E;h++){
    for(let mm=0;mm<60;mm+=30){
      const s=new Date(d);s.setHours(h,mm,0,0);
      const e=new Date(s.getTime()+30*60000);
      const booked=APPTS.some(a=>(pid?a.provider===pid:true)&&a.start<e&&a.end>s&&sameD(a.start,d));
      slots.push({s,e,booked,h,mm});
    }
  }
  return slots;
}

/* ════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════ */
function setView(v){
  view=v;
  document.querySelectorAll('.v-tab').forEach(t=>t.classList.toggle('active',t.textContent.trim().toLowerCase()===v));
  render();
}
function goToday(){curD=new Date(today);render();}
function nav(d){
  const c=new Date(curD);
  if(view==='month') c.setMonth(c.getMonth()+d);
  else if(view==='week') c.setDate(c.getDate()+7*d);
  else c.setDate(c.getDate()+d);
  curD=c; render();
}
function toggleP(id){
  if(visP.has(id)) visP.delete(id); else visP.add(id);
  render();
}

/* ════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════ */
function renderSidebar(){
  document.getElementById('sbProviders').innerHTML=PROVIDERS.map(p=>`
    <div class="sb-prov-item" onclick="toggleP(${p.id})">
      <div class="prov-dot" style="background:${p.color}"></div>
      <span class="prov-nm">${p.name.split(' ').pop()}</span>
      <button class="prov-tog ${visP.has(p.id)?'on':''}" id="pt${p.id}"></button>
    </div>
  `).join('');
}

/* ════════════════════════════════════════
   TOOLBAR
════════════════════════════════════════ */
function renderToolbar(){
  const d=curD;
  let lbl='';
  if(view==='month') lbl=`${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  else if(view==='week'){const ws=wkStart(d),we=addD(ws,6);lbl=`${MONTHS[ws.getMonth()].slice(0,3)} ${ws.getDate()} – ${ws.getMonth()!==we.getMonth()?MONTHS[we.getMonth()].slice(0,3)+' ':''}${we.getDate()}, ${we.getFullYear()}`;}
  else if(view==='today') lbl=`Today · ${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}, ${d.getFullYear()}`;
  else lbl=`${WDS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  document.getElementById('dateLabel').textContent=lbl;

  const vis=APPTS.filter(a=>visP.has(a.provider));
  const cnt={pending:0,confirmed:0,completed:0};
  vis.forEach(a=>{if(cnt[a.status]!==undefined)cnt[a.status]++;});
  document.getElementById('statChips').innerHTML=`
    <div class="s-chip pend"><div class="s-chip-dot" style="background:#f59e0b"></div>${cnt.pending} Pending</div>
    <div class="s-chip conf"><div class="s-chip-dot" style="background:#10b981"></div>${cnt.confirmed} Confirmed</div>
    <div class="s-chip comp"><div class="s-chip-dot" style="background:#3b82f6"></div>${cnt.completed} Done</div>
  `;
}

/* ════════════════════════════════════════
   RIGHT PANEL
════════════════════════════════════════ */
function renderRightPanel(){
  // Determine context date
  let ctxDate = curD;
  if(view==='week'){
    // use curD as context, right panel shows week range
  }

  const rpTitle=document.getElementById('rpTitle');
  const rpDate=document.getElementById('rpDate');
  const rpBody=document.getElementById('rpBody');

  const viewLabels={today:'Today\'s Overview',day:'Day Overview',week:'Week Overview',month:'Monthly Overview'};
  rpTitle.textContent=viewLabels[view]||'Overview';

  if(view==='today'||view==='day'){
    rpDate.textContent=`${WDS[ctxDate.getDay()]}, ${MONTHS[ctxDate.getMonth()]} ${ctxDate.getDate()} ${ctxDate.getFullYear()}`;
  } else if(view==='week'){
    const ws=wkStart(ctxDate),we=addD(ws,6);
    rpDate.textContent=`${MONTHS[ws.getMonth()].slice(0,3)} ${ws.getDate()} – ${MONTHS[we.getMonth()].slice(0,3)} ${we.getDate()}`;
  } else {
    rpDate.textContent=`${MONTHS[ctxDate.getMonth()]} ${ctxDate.getFullYear()}`;
  }

  // Build provider cards
  const activeP=PROVIDERS.filter(p=>visP.has(p.id));

  // Compute appointments per provider for context
  let dateRange=[];
  if(view==='today'||view==='day'){
    dateRange=[ctxDate];
  } else if(view==='week'){
    const ws=wkStart(ctxDate);
    for(let i=0;i<7;i++) dateRange.push(addD(ws,i));
  } else {
    // Month: all days in month
    const y=ctxDate.getFullYear(),mo=ctxDate.getMonth();
    const dim=new Date(y,mo+1,0).getDate();
    for(let i=1;i<=dim;i++) dateRange.push(new Date(y,mo,i));
  }

  const provCards=activeP.map(p=>{
    const appts=APPTS.filter(a=>a.provider===p.id&&dateRange.some(d=>sameD(a.start,d)));
    const total=(view==='today'||view==='day')?((BIZ_E-BIZ_S)*2):(dateRange.length*(BIZ_E-BIZ_S)*2);
    const used=appts.reduce((acc,a)=>acc+Math.ceil(a.dur/30),0);
    const loadPct=Math.min(100,Math.round(used/total*100));
    const free=Math.max(0,total-used);
    const loadColor=loadPct>75?'#ef4444':loadPct>50?'#f59e0b':'#10b981';
    const conf=appts.filter(a=>a.status==='confirmed').length;
    const pend=appts.filter(a=>a.status==='pending').length;
    return `
      <div class="rp-prov-card" style="border-left-color:${p.color}" onclick="selectProvider(${p.id})">
        <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${p.color};border-radius:2px 0 0 2px"></div>
        <div class="prov-av" style="background:${p.color};margin-left:6px">${p.init}</div>
        <div class="prov-info">
          <div class="prov-name-sm">${p.name.replace('Dr. ','')}</div>
          <div class="prov-meta">${p.role}</div>
          <div class="prov-load-bar"><div class="prov-load-fill" style="width:${loadPct}%;background:${loadColor}"></div></div>
        </div>
        <div class="prov-stats">
          <div class="prov-stat"><span class="prov-stat-n">${appts.length}</span><span class="prov-stat-l">Appts</span></div>
          <div class="prov-stat"><span class="prov-stat-n" style="color:#10b981">${free}</span><span class="prov-stat-l">Free</span></div>
        </div>
      </div>
    `;
  }).join('');

  // Slot section — for day/today show slots for ctxDate, for week show for curD, for month show today
  const slotDate = (view==='month') ? today : ctxDate;
  const slotAppt = byDay(slotDate);

  // Group slots by hour
  const slotsByHour={};
  activeP.forEach(p=>{
    genSlots(slotDate,p.id).forEach(sl=>{
      const k=sl.h;
      if(!slotsByHour[k]) slotsByHour[k]=[];
      slotsByHour[k].push({...sl,pid:p.id,pcolor:p.color,pname:p.name.split(' ').pop()});
    });
  });

  const slotSummary=`
    <div class="rp-slots-section">
      <div class="rp-section-label">
        Available Slots — ${view==='month'?'Today':WDS[slotDate.getDay()]+' '+slotDate.getDate()}
        <span>${Object.values(slotsByHour).flat().filter(s=>!s.booked).length} free</span>
      </div>
      <div class="slots-grid">
        ${Object.keys(slotsByHour).sort((a,b)=>a-b).map(h=>{
          const hourSlots=slotsByHour[h];
          // Deduplicate by time — show one row per half-hour with provider dots
          const byTime={};
          hourSlots.forEach(s=>{
            const k=`${s.h}:${String(s.mm).padStart(2,'0')}`;
            if(!byTime[k]) byTime[k]={s,provs:[]};
            byTime[k].provs.push({pid:s.pid,color:s.pcolor,booked:s.booked});
          });
          const slots=Object.values(byTime);
          const anyFree=slots.some(x=>x.provs.some(p=>!p.booked));
          if(!anyFree) return '';
          const hLabel=parseInt(h)<12?`${h}am`:parseInt(h)===12?'12pm':`${parseInt(h)-12}pm`;
          return `<div class="slot-hour-group">
            <div class="slot-hour-lbl">${hLabel}</div>
            <div class="slot-row">
              ${slots.map(({s,provs})=>{
                const freeProvs=provs.filter(p=>!p.booked);
                if(!freeProvs.length) return '';
                const lbl=`${parseInt(h)<12?h:h===12?12:parseInt(h)-12}:${String(s.mm).padStart(2,'0')}${parseInt(h)<12?'a':'p'}`;
                return `<div class="slot-pill free" title="${freeProvs.map(p=>PROVIDERS.find(x=>x.id===p.pid)?.name).join(', ')} available">
                  ${freeProvs.map(p=>`<div class="slot-prov-dot" style="background:${p.color}"></div>`).join('')}
                  ${lbl}
                </div>`;
              }).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;

  rpBody.innerHTML=`
    <div class="rp-section anim">
      <div class="rp-section-label">Providers <span>${activeP.length} active</span></div>
      ${provCards}
    </div>
    ${slotSummary}
  `;
}

function selectProvider(id){
  selProv=selProv===id?null:id;
  renderRightPanel();
}

/* ════════════════════════════════════════
   HOUR LINES HELPER
════════════════════════════════════════ */
function hourLines(gridH){
  let html='';
  const n=BIZ_E-BIZ_S;
  for(let i=0;i<=n;i++){
    html+=`<div class="h-line" style="top:${i*HR_H}px"></div>`;
    if(i<n) html+=`<div class="hh-line" style="top:${i*HR_H+HR_H/2}px"></div>`;
  }
  return html;
}
function timeLabels(){
  let html='';
  for(let h=BIZ_S;h<=BIZ_E;h++){
    const lbl=h===BIZ_S?'':h<12?`${h}am`:h===12?'12pm':`${h-12}pm`;
    html+=`<div class="t-lbl" style="height:${HR_H}px">${lbl}</div>`;
  }
  return html;
}

/* ════════════════════════════════════════
   TODAY VIEW
════════════════════════════════════════ */
function renderToday(){
  const d=today;
  const appts=byDay(d).sort((a,b)=>a.start-b.start);
  const now=new Date();
  const upcoming=appts.filter(a=>a.end>now);
  const done=appts.filter(a=>a.end<=now);

  const totalSlots=PROVIDERS.filter(p=>visP.has(p.id)).length*(BIZ_E-BIZ_S)*2;
  const used=appts.reduce((a,x)=>a+Math.ceil(x.dur/30),0);
  const freeSlots=Math.max(0,totalSlots-used);

  document.getElementById('calPane').innerHTML=`
    <div class="today-view anim">
      <div class="today-hero">
        <div class="today-hero-date">${WDS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}</div>
        <div class="today-hero-sub">Here's your schedule for today</div>
        <div class="today-hero-stats">
          <div class="today-stat"><div class="today-stat-n">${appts.length}</div><div class="today-stat-l">Total Today</div></div>
          <div class="today-stat"><div class="today-stat-n">${upcoming.length}</div><div class="today-stat-l">Upcoming</div></div>
          <div class="today-stat"><div class="today-stat-n">${done.length}</div><div class="today-stat-l">Completed</div></div>
          <div class="today-stat"><div class="today-stat-n" style="color:#7dd3fc">${freeSlots}</div><div class="today-stat-l">Free Slots</div></div>
        </div>
      </div>

      ${upcoming.length?`<div class="today-section-lbl">Upcoming — ${upcoming.length} remaining</div>
      <div class="today-appt-list">
        ${upcoming.map(a=>{
          const sc=STATUS_C[a.status]||STATUS_C.confirmed;
          const p=PROVIDERS.find(x=>x.id===a.provider);
          return`<div class="today-appt-row" style="border-left-color:${p.color}" onclick="openAppt(${a.id})">
            <div class="ta-time">${f12(a.start)}</div>
            <div class="ta-info">
              <div class="ta-name">${esc(a.customer)}</div>
              <div class="ta-svc">${esc(a.service)} · ${a.dur}m</div>
            </div>
            <div class="ta-prov"><div class="ta-prov-av" style="background:${p.color}">${p.init}</div></div>
            <div class="ta-status" style="background:${sc.bg};color:${sc.c}">${a.status}</div>
          </div>`;
        }).join('')}
      </div>`:''}

      ${done.length?`<div class="today-section-lbl" style="margin-top:8px">Completed — ${done.length}</div>
      <div class="today-appt-list" style="opacity:.65">
        ${done.map(a=>{
          const p=PROVIDERS.find(x=>x.id===a.provider);
          return`<div class="today-appt-row" style="border-left-color:${p.color};opacity:.7" onclick="openAppt(${a.id})">
            <div class="ta-time">${f12(a.start)}</div>
            <div class="ta-info">
              <div class="ta-name">${esc(a.customer)}</div>
              <div class="ta-svc">${esc(a.service)}</div>
            </div>
            <div class="ta-prov"><div class="ta-prov-av" style="background:${p.color}">${p.init}</div></div>
            <div class="ta-status" style="background:#d1fae5;color:#065f46">done</div>
          </div>`;
        }).join('')}
      </div>`:''}

      ${!appts.length?`<div style="text-align:center;padding:40px 0;color:var(--txt3)">
        <div style="font-size:32px;margin-bottom:8px">🗓</div>
        <div style="font-size:14px;font-weight:600;color:var(--txt2)">No appointments today</div>
        <div style="font-size:12px;margin-top:4px">Clear schedule — ${freeSlots} slots available</div>
      </div>`:''}
    </div>
  `;
}

/* ════════════════════════════════════════
   MONTH VIEW
════════════════════════════════════════ */
function renderMonth(){
  const y=curD.getFullYear(),mo=curD.getMonth();
  const first=new Date(y,mo,1);
  let off=first.getDay()-1; if(off<0)off=6;
  const dim=new Date(y,mo+1,0).getDate();
  const prevDim=new Date(y,mo,0).getDate();
  const cells=[];
  for(let i=0;i<42;i++){
    let date,other=false;
    if(i<off){date=new Date(y,mo-1,prevDim-off+1+i);other=true;}
    else if(i>=off+dim){date=new Date(y,mo+1,i-off-dim+1);other=true;}
    else date=new Date(y,mo,i-off+1);
    cells.push({date,other});
  }
  const wdRow=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  document.getElementById('calPane').innerHTML=`
    <div class="month-view anim">
      <div class="month-wds">${wdRow.map(w=>`<div class="month-wd">${w}</div>`).join('')}</div>
      <div class="month-grid">${cells.map(({date,other})=>{
        const isT=sameD(date,today);
        const wk=date.getDay()===0||date.getDay()===6;
        const isSel=sameD(date,curD)&&!other;
        const cls=['m-cell',isT?'is-today':'',wk&&!other?'is-wknd':'',other?'is-other':'',isSel?'is-selected':''].filter(Boolean).join(' ');
        const appts=other?[]:byDay(date);
        const chips=appts.slice(0,3);
        const more=Math.max(0,appts.length-3);
        const totalSl=(BIZ_E-BIZ_S)*2*PROVIDERS.filter(p=>visP.has(p.id)).length;
        const usedSl=appts.reduce((a,x)=>a+Math.ceil(x.dur/30),0);
        const avPct=Math.max(0,Math.min(100,(1-usedSl/Math.max(1,totalSl))*100));
        const barClr=avPct>50?'#10b981':avPct>20?'#f59e0b':'#ef4444';
        return`<div class="${cls}" onclick="handleMCell('${ds(date)}',event)" data-date="${ds(date)}">
          <div class="m-cell-hd">
            <div class="m-day-n">${date.getDate()}</div>
            ${!other?`<div class="m-prov-dots">${PROVIDERS.filter(p=>visP.has(p.id)).map(p=>{
              const has=byDayP(date,p.id).length>0;
              return`<div class="m-pd" style="background:${has?p.color:p.color+'30'};${has?'':'border:1.5px solid '+p.color+'55'}"></div>`;
            }).join('')}</div>`:''}
          </div>
          ${!other?`
            <div class="m-chips">
              ${chips.map(a=>`<div class="m-chip" style="background:${pColor(a.provider)}" onclick="openAppt(${a.id},event)" data-id="${a.id}">
                <span class="m-chip-t">${f12(a.start)}</span>
                <span class="m-chip-n">${a.customer.split(' ')[0]}</span>
              </div>`).join('')}
              ${more?`<div class="m-more">+${more} more</div>`:''}
            </div>
            ${appts.length||isT?`<div class="m-avbar"><div class="m-avfill" style="width:${avPct}%;background:${barClr}"></div></div>`:''}
          `:''}
        </div>`;
      }).join('')}</div>
    </div>
  `;
}

function handleMCell(dstr,e){
  if(e.target.closest('.m-chip')) return;
  curD=new Date(dstr+'T00:00:00');
  setView('day');
}

/* ════════════════════════════════════════
   WEEK VIEW — FULL TIME GRID
════════════════════════════════════════ */
function renderWeek(){
  const ws=wkStart(curD);
  const days=[]; for(let i=0;i<7;i++) days.push(addD(ws,i));
  const gridH=(BIZ_E-BIZ_S)*HR_H;
  const nowD=new Date();

  // Column headers
  const colHds=`
    <div class="wk-col-hds anim">
      <div></div>
      ${days.map(d=>{
        const isT=sameD(d,today);
        const isSel=sameD(d,curD);
        return`<div class="wk-ch" style="cursor:pointer" onclick="selWkDay('${ds(d)}')">
          <div class="wk-wd ${isT?'t-txt':''}">${WDS[d.getDay()]}</div>
          <div class="wk-dn ${isT?'is-today':isSel&&!isT?'is-sel':''}">${d.getDate()}</div>
        </div>`;
      }).join('')}
    </div>
  `;

  // Day columns
  const dayCols=days.map((d,di)=>{
    const isT=sameD(d,today);
    const wk=d.getDay()===0||d.getDay()===6;
    const appts=resolveOL(byDay(d));
    const nowOff=isT?topPx(nowD):-1;
    const apptBlocks=appts.map(a=>{
      const tp=topPx(a.start);
      const ht=htPx(a.dur);
      const clr=pColor(a.provider);
      const cw=`${Math.round(100/a._cc)-1}%`;
      const cl=`${Math.round(a._c*100/a._cc)}%`;
      const tiny=ht<30,short=ht<45;
      return`<div class="wa" style="top:${tp}px;height:${ht}px;background:${clr};left:calc(3px + ${cl});width:calc(${cw} - 6px)" onclick="openAppt(${a.id})">
        <div class="wa-name">${tiny?a.customer.split(' ')[0]:a.customer}</div>
        ${!tiny?`<div class="wa-svc">${a.service}</div>`:''}
        ${!short?`<div class="wa-time">${f12(a.start)}–${f12(a.end)}</div>`:''}
      </div>`;
    }).join('');
    return`<div class="dc ${isT?'t-col':''} ${wk?'wk-col':''}" style="height:${gridH}px">
      ${hourLines(gridH)}
      ${nowOff>=0&&nowOff<=gridH?`<div class="now-ln" style="top:${nowOff}px"></div>`:''}
      ${apptBlocks}
    </div>`;
  }).join('');

  document.getElementById('calPane').innerHTML=`
    <div class="week-view anim">
      ${colHds}
      <div class="wk-scroll" id="wkScroll">
        <div class="wk-grid" style="min-height:${gridH+16}px">
          <div class="tc">${timeLabels()}</div>
          ${dayCols}
        </div>
      </div>
    </div>
  `;
}
function selWkDay(dstr){curD=new Date(dstr+'T00:00:00');setView('day');}

/* ════════════════════════════════════════
   DAY VIEW — MULTI-PROVIDER TIME GRID
════════════════════════════════════════ */
function renderDay(){
  const activeP=PROVIDERS.filter(p=>visP.has(p.id));
  const gridH=(BIZ_E-BIZ_S)*HR_H;
  const nowD=new Date();
  const isToday=sameD(curD,today);
  const nowOff=isToday?topPx(nowD):-1;
  const colGrid=`repeat(${activeP.length||1},1fr)`;

  // Provider headers
  const pHds=activeP.map(p=>{
    const cnt=byDayP(curD,p.id).length;
    return`<div class="dv-pc-hd">
      <div class="dv-av" style="background:${p.color}">${p.init}</div>
      <span class="dv-pnm">${p.name.replace('Dr. ','')}</span>
      <span class="dv-pcnt">${cnt}</span>
    </div>`;
  }).join('');

  // Provider stripes
  const stripes=activeP.map(p=>{
    const appts=resolveOL(byDayP(curD,p.id));
    const blocks=appts.map(a=>{
      const tp=topPx(a.start);
      const ht=htPx(a.dur);
      const cw=`${Math.round(100/a._cc)-2}%`;
      const cl=`${Math.round(a._c*100/a._cc)}%`;
      const short=ht<38,tiny=ht<26;
      return`<div class="da" style="top:${tp}px;height:${ht}px;background:${p.color};left:calc(4px + ${cl});width:calc(${cw} - 8px)" onclick="openAppt(${a.id})">
        <div class="da-nm">${a.customer}</div>
        ${!tiny?`<div class="da-svc">${a.service}</div>`:''}
        ${!short?`<div class="da-tm">${f12(a.start)}–${f12(a.end)}</div>`:''}
      </div>`;
    }).join('');
    return`<div class="dv-stripe">${hourLines(gridH)}${blocks}</div>`;
  }).join('');

  // Now line full-width
  const nowLine=nowOff>=0&&nowOff<=gridH?`<div style="position:absolute;left:0;right:0;top:${nowOff}px;height:2px;background:#ef4444;z-index:10;pointer-events:none">
    <div style="width:8px;height:8px;border-radius:50%;background:#ef4444;position:absolute;left:-4px;top:-3px"></div>
  </div>`:'';

  document.getElementById('calPane').innerHTML=`
    <div class="day-view anim">
      <div class="dv-prov-hd">
        <div class="dv-tc-sp"></div>
        <div class="dv-prov-cols" style="grid-template-columns:${colGrid}">${pHds}</div>
      </div>
      <div class="dv-scroll" id="dvScroll">
        <div class="dv-grid" style="padding-bottom:16px">
          <div class="tc">${timeLabels()}</div>
          <div style="position:relative;display:grid;grid-template-columns:${colGrid};min-height:${gridH}px">
            ${nowLine}
            ${stripes}
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ════════════════════════════════════════
   APPOINTMENT FLYOUT
════════════════════════════════════════ */
function openAppt(id,e){
  if(e) e.stopPropagation();
  const a=APPTS.find(x=>x.id===id); if(!a) return;
  const p=PROVIDERS.find(x=>x.id===a.provider);
  const sc=STATUS_C[a.status]||STATUS_C.confirmed;
  document.getElementById('flyTitle').textContent=a.customer;
  document.getElementById('flyBody').innerHTML=`
    <div class="fly-row">
      <div class="fly-lbl">Status</div>
      <div><span class="fly-status" style="background:${sc.bg};color:${sc.c}">
        <div style="width:6px;height:6px;border-radius:50%;background:${sc.c}"></div>
        ${a.status.charAt(0).toUpperCase()+a.status.slice(1)}
      </span></div>
    </div>
    <div class="fly-row">
      <div class="fly-lbl">Date & Time</div>
      <div class="fly-val">${WDS[a.start.getDay()]}, ${MONTHS[a.start.getMonth()]} ${a.start.getDate()} · ${f12(a.start)} – ${f12(a.end)}</div>
    </div>
    <div class="fly-row">
      <div class="fly-lbl">Service</div>
      <div class="fly-val">${esc(a.service)} <span style="color:var(--txt3);font-size:12px">(${a.dur}min)</span></div>
    </div>
    <div class="fly-row">
      <div class="fly-lbl">Provider</div>
      <div class="fly-val" style="display:flex;align-items:center;gap:8px">
        <div style="width:26px;height:26px;border-radius:50%;background:${p.color};display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700">${p.init}</div>
        ${p.name}
      </div>
    </div>
    <div class="fly-row">
      <div class="fly-lbl">Customer</div>
      <div class="fly-val">${esc(a.customer)}</div>
    </div>
    <div class="fly-row" style="border-top:1px solid var(--bdr);padding-top:12px">
      <div class="fly-lbl">Quick Actions</div>
      <div style="display:flex;flex-direction:column;gap:5px;margin-top:6px">
        <button style="padding:7px 12px;border-radius:var(--r-sm);border:1.5px solid #a7f3d0;background:#ecfdf5;color:#065f46;font-size:12px;font-weight:600;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif">✓ Mark Confirmed</button>
        <button style="padding:7px 12px;border-radius:var(--r-sm);border:1.5px solid #bfdbfe;background:#eff6ff;color:#1e40af;font-size:12px;font-weight:600;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif">↗ Mark Completed</button>
        <button style="padding:7px 12px;border-radius:var(--r-sm);border:1.5px solid #fde68a;background:#fffbeb;color:#92400e;font-size:12px;font-weight:600;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif">🔁 Reschedule</button>
      </div>
    </div>
  `;
  document.getElementById('flyout').classList.add('on');
  document.getElementById('overlay').classList.add('on');
}
function closeFlyout(){
  document.getElementById('flyout').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
}

/* ════════════════════════════════════════
   MAIN RENDER
════════════════════════════════════════ */
function render(){
  renderToolbar();
  renderSidebar();
  if(view==='today') renderToday();
  else if(view==='month') renderMonth();
  else if(view==='week') renderWeek();
  else renderDay();
  renderRightPanel();
}

render();
</script>
</body>
</html>
